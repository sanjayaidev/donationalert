<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stream Tips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a25;
      --surface3: #222230;
      --text: #e8e8ed;
      --text-dim: #9999aa;
      --accent: #7c5cff;
      --accent2: #ff4d8d;
      --border: #2a2a3a;
      --border2: #3a3a4a;
      --success: #00dc82;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    /* Main Layout */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .video-container {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 30px;
    }
    .video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .hero-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
    }
    .hero-subtitle {
      color: var(--text-dim);
      font-size: 16px;
      text-align: center;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-family: var(--font-sans);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(124, 92, 255, 0.3);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover {
      background: var(--surface2);
    }
    
    /* Side Panel */
    .side-panel {
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      max-height: 100vh;
    }
    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    /* Tip Form */
    .tip-form {
      background: var(--surface2);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border);
    }
    .step-panel { display: none; }
    .step-panel.active { display: block; }
    .fld { margin-bottom: 14px; }
    .fld-label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-family: var(--font-mono);
    }
    .fld input, .fld select, .fld textarea {
      width: 100%;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-sans);
      outline: none;
      transition: border-color 0.2s;
    }
    .fld input:focus, .fld select:focus, .fld textarea:focus {
      border-color: var(--accent);
    }
    .preset-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .preset-btn {
      background: var(--surface3);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .preset-btn:hover, .preset-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
    }
    
    /* Review box */
    .review-box {
      background: var(--surface3);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid var(--border2);
    }
    .rv-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .rv-row:last-child { border-bottom: none; }
    .rv-row span:first-child { color: var(--text-dim); }
    
    /* Chat Box */
    .chat-container {
      background: var(--surface2);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 400px;
    }
    .chat-input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .chat-input-group input {
      flex: 1;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }
    .chat-frame-wrapper {
      flex: 1;
      background: var(--surface3);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
    }
    .chat-scaler {
      transform-origin: center center;
      transition: transform 0.3s ease;
    }
    .chat-scaler iframe {
      border: none;
      display: block;
    }
    .chat-placeholder {
      color: var(--text-dim);
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }
    
    /* Media content styles */
    .media-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .responsive-media {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }
    
    /* Animated Alert/Notification System */
    .animated-alert {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, var(--surface2), var(--surface3));
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      z-index: 10000;
      opacity: 0;
      transform: translateX(400px);
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      min-width: 280px;
      backdrop-filter: blur(10px);
    }
    .animated-alert.show {
      opacity: 1;
      transform: translateX(0);
    }
    .alert-icon {
      font-size: 20px;
      animation: pulse 2s infinite;
    }
    .alert-message {
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    /* Animated Text Effects */
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent); }
      50% { text-shadow: 0 0 20px var(--accent), 0 0 30px var(--accent2); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .animated-text-glow {
      animation: glow 2s ease-in-out infinite;
    }
    .animated-text-slide {
      animation: slideIn 0.5s ease-out;
    }
    .animated-text-bounce {
      animation: bounce 1s ease-in-out infinite;
    }
    .animated-text-shake {
      animation: shake 0.5s ease-in-out;
    }
    
    /* Responsive */
    @media (max-width: 900px) {
      body { flex-direction: column; }
      .side-panel {
        width: 100%;
        max-height: none;
        border-left: none;
        border-top: 1px solid var(--border);
      }
      .video-container { max-width: 100%; }
      .animated-alert {
        left: 20px;
        right: 20px;
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="video-container">
      <iframe id="main-video" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <h1 class="hero-title">Support the Stream</h1>
    <p class="hero-subtitle">Send a tip to show your appreciation</p>
    <button class="btn btn-primary" onclick="scrollToTip()">
      <i class="ti ti-heart"></i> Send a Tip
    </button>
  </div>
  
  <div class="side-panel">
    <!-- Tip Form -->
    <div class="tip-form">
      <div class="panel-title">Send a Tip</div>
      
      <!-- Step 1: Details -->
      <div class="step-panel active" id="step1">
        <div class="fld">
          <label class="fld-label">Your Name (optional)</label>
          <input type="text" id="f-name" placeholder="Anonymous">
        </div>
        <div class="fld">
          <label class="fld-label">Your Email (optional)</label>
          <input type="email" id="f-email" placeholder="your@email.com">
        </div>
        <div class="fld">
          <label class="fld-label">Amount</label>
          <div class="preset-btns">
            <button class="preset-btn" onclick="selectAmount(50)">₹50</button>
            <button class="preset-btn" onclick="selectAmount(100)">₹100</button>
            <button class="preset-btn" onclick="selectAmount(250)">₹250</button>
            <button class="preset-btn" onclick="selectAmount(500)">₹500</button>
          </div>
          <input type="number" id="f-amount" placeholder="or enter custom amount" min="1" style="margin-top:8px;">
        </div>
        <div class="fld">
          <label class="fld-label">Message (optional)</label>
          <input type="text" id="f-msg" placeholder="Cheer or shoutout for the stream…">
        </div>
        <button class="btn btn-primary" onclick="goStep(2)">Review tip <i class="ti ti-arrow-right"></i></button>
      </div>
      
      <!-- Step 2: Review -->
      <div class="step-panel" id="step2">
        <div class="review-box">
          <div class="rv-row"><span>Name</span><span id="r-name">—</span></div>
          <div class="rv-row"><span>Email</span><span id="r-email">—</span></div>
          <div class="rv-row"><span>Amount</span><span style="color:var(--accent2);font-size:14px" id="r-amt">₹0</span></div>
          <div class="rv-row"><span>Message</span><span id="r-msg" style="max-width:60%;text-align:right">—</span></div>
        </div>
        <button class="btn btn-primary" onclick="goStep(3)"><i class="ti ti-lock"></i> Proceed to Payment</button>
        <button class="btn btn-ghost" onclick="goStep(1)" style="margin-top:8px;width:100%">← Edit details</button>
      </div>
      
      <!-- Step 3: Payment -->
      <div class="step-panel" id="step3">
        <div class="fld">
          <label class="fld-label">Select Payment Method</label>
          <select id="payment-method" onchange="updatePaymentUI()" style="width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:9px;padding:9px 12px;color:var(--text);font-size:12px;font-family:var(--font-mono);outline:none;transition:.15s;">
            <option value="cashfree">Cashfree</option>
            <option value="razorpay">Razorpay</option>
            <option value="paypal">PayPal</option>
          </select>
        </div>
        <button class="btn btn-primary" id="pay-btn" onclick="processPayment()" style="width:100%;justify-content:center;margin-bottom:10px;">
          Pay Now
        </button>
        <button class="btn btn-ghost" onclick="goStep(2)" style="width:100%">← Back</button>
      </div>
    </div>
    
    <!-- Chat Box -->
    <div class="chat-container">
      <div class="panel-title">Live Chat / Media Viewer</div>
      <div class="chat-input-group" style="flex-direction: column; gap: 10px;">
        <input type="text" id="chat-url" placeholder="Enter chat URL (StreamElements, Twitch, etc.)...">
        <input type="text" id="media-url" placeholder="Or enter image/video/GIF URL directly...">
        <div style="display: flex; gap: 8px;">
          <button class="btn btn-primary" onclick="loadChat()" style="flex: 1; padding: 8px 14px;">Load Chat</button>
          <button class="btn btn-ghost" onclick="loadMedia()" style="flex: 1; padding: 8px 14px;">Load Media</button>
        </div>
      </div>
      <div class="chat-frame-wrapper" id="chat-wrapper">
        <div class="chat-placeholder">Enter a URL above to load live chat, image, video, or GIF</div>
      </div>
    </div>
  </div>

  <!-- Razorpay SDK -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <!-- PayPal SDK -->
  <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
  
  <script>
    // Configuration from environment - these will be replaced by Vercel at build time
    const DEFAULT_YOUTUBE_URL = typeof process !== 'undefined' ? process.env.DEFAULT_YOUTUBE_URL : 'DEFAULT_YOUTUBE_URL';
    const SE_CHAT_URL = typeof process !== 'undefined' ? process.env.SE_CHAT_URL : 'SE_CHAT_URL';
    
    let selectedAmount = 0;
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      // Load default video
      const videoFrame = document.getElementById('main-video');
      if (DEFAULT_YOUTUBE_URL && DEFAULT_YOUTUBE_URL !== 'DEFAULT_YOUTUBE_URL') {
        videoFrame.src = DEFAULT_YOUTUBE_URL;
      } else {
        videoFrame.src = 'https://www.youtube.com/embed/live_stream?channel=UC_x5XG1OV2P6uZZ5FSM9Ttw'; // Default NASA
      }
      
      // Load default chat from environment variable
      const chatInput = document.getElementById('chat-url');
      if (SE_CHAT_URL && SE_CHAT_URL !== 'SE_CHAT_URL') {
        chatInput.value = SE_CHAT_URL;
        setTimeout(() => loadChat(), 500);
      }
    });
    
    function scrollToTip() {
      document.querySelector('.tip-form').scrollIntoView({ behavior: 'smooth' });
    }
    
    function selectAmount(amount) {
      selectedAmount = amount;
      document.getElementById('f-amount').value = amount;
      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.classList.remove('selected');
        if (btn.textContent.includes('₹' + amount)) {
          btn.classList.add('selected');
        }
      });
    }
    
    document.getElementById('f-amount')?.addEventListener('input', (e) => {
      selectedAmount = parseFloat(e.target.value) || 0;
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('selected'));
    });
    
    function goStep(step) {
      // Hide all steps
      document.querySelectorAll('.step-panel').forEach(panel => {
        panel.classList.remove('active');
      });
      
      if (step === 2) {
        // Validate and populate review
        const name = document.getElementById('f-name').value || 'Anonymous';
        const email = document.getElementById('f-email').value || '—';
        const amount = parseFloat(document.getElementById('f-amount').value) || 0;
        const msg = document.getElementById('f-msg').value || '—';
        
        if (amount <= 0) {
          alert('Please enter a valid amount');
          step = 1;
        } else {
          document.getElementById('r-name').textContent = name;
          document.getElementById('r-email').textContent = email;
          document.getElementById('r-amt').textContent = '₹' + amount.toFixed(2);
          document.getElementById('r-msg').textContent = msg;
        }
      }
      
      if (step === 3) {
        updatePaymentUI();
      }
      
      // Show target step
      document.getElementById('step' + step).classList.add('active');
    }
    
    function updatePaymentUI() {
      const method = document.getElementById('payment-method').value;
      const payBtn = document.getElementById('pay-btn');
      
      if (method === 'razorpay') {
        payBtn.textContent = 'Pay with Razorpay';
      } else if (method === 'paypal') {
        payBtn.textContent = 'Pay with PayPal';
      } else {
        payBtn.textContent = 'Pay with Cashfree';
      }
    }
    
    async function processPayment() {
      const method = document.getElementById('payment-method').value;
      const amount = parseFloat(document.getElementById('f-amount').value) || 0;
      const name = document.getElementById('f-name').value || 'Anonymous';
      const message = document.getElementById('f-msg').value || '';
      
      if (amount <= 0) {
        alert('Please enter a valid amount');
        return;
      }
      
      try {
        if (method === 'razorpay') {
          await processRazorpay(amount, name, message);
        } else if (method === 'paypal') {
          await processPayPal(amount, name, message);
        } else if (method === 'cashfree') {
          await processCashfree(amount, name, message);
        }
      } catch (error) {
        console.error('Payment error:', error);
        alert('Payment failed: ' + error.message);
      }
    }
    
    async function processRazorpay(amount, name, message) {
      // In production, fetch order from backend
      const options = {
        key: 'YOUR_RAZORPAY_KEY_ID', // Replace with env var
        amount: Math.round(amount * 100),
        currency: 'INR',
        name: 'Stream Tips',
        description: 'Tip from ' + name,
        handler: function(response) {
          alert('Payment successful! Payment ID: ' + response.razorpay_payment_id);
          resetForm();
        },
        prefill: {
          name: name
        },
        theme: {
          color: '#7c5cff'
        }
      };
      
      const rzp = new Razorpay(options);
      rzp.open();
    }
    
    async function processPayPal(amount, name, message) {
      // Redirect to PayPal or use PayPal buttons
      alert('PayPal integration - redirecting to PayPal...');
      // In production, integrate PayPal SDK properly
      resetForm();
    }
    
    async function processCashfree(amount, name, message) {
      // Redirect to Cashfree checkout
      alert('Cashfree integration - redirecting to Cashfree...');
      // In production, integrate Cashfree SDK properly
      resetForm();
    }
    
    function resetForm() {
      document.getElementById('f-name').value = '';
      document.getElementById('f-email').value = '';
      document.getElementById('f-amount').value = '';
      document.getElementById('f-msg').value = '';
      selectedAmount = 0;
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('selected'));
      goStep(1);
    }
    
    function loadChat() {
      const url = document.getElementById('chat-url').value.trim();
      const wrapper = document.getElementById('chat-wrapper');
      
      if (!url) {
        wrapper.innerHTML = '<div class="chat-placeholder">Enter a chat URL above to load live chat</div>';
        return;
      }
      
      // Default: iframe for chat URLs
      wrapper.innerHTML = '<div class="chat-scaler" id="chat-scaler"><iframe id="chat-frame" src="' + url + '" allow="clipboard-write"></iframe></div>';
      
      // Wait for iframe to load then scale
      const iframe = document.getElementById('chat-frame');
      iframe.onload = () => {
        scaleChat();
        showAlert('Chat loaded successfully!', 'success');
      };
      setTimeout(() => {
        scaleChat();
        showAlert('Chat loaded successfully!', 'success');
      }, 1000); // Fallback timeout
    }
    
    function loadMedia() {
      const url = document.getElementById('media-url').value.trim();
      const wrapper = document.getElementById('chat-wrapper');
      
      if (!url) {
        showAlert('Please enter a media URL', 'warning');
        return;
      }
      
      // Detect media type and render accordingly
      if (isGif(url)) {
        wrapper.innerHTML = '<div class="media-content"><img src="' + url + '" alt="GIF" class="responsive-media"></div>';
        showAlert('GIF loaded successfully!', 'success');
      } else if (isVideo(url)) {
        wrapper.innerHTML = '<div class="media-content"><video src="' + url + '" controls autoplay loop class="responsive-media"></video></div>';
        showAlert('Video loaded successfully!', 'success');
      } else if (isImage(url)) {
        wrapper.innerHTML = '<div class="media-content"><img src="' + url + '" alt="Media" class="responsive-media"></div>';
        showAlert('Image loaded successfully!', 'success');
      } else if (isDirectMediaURL(url)) {
        // Generic media handler - try as image first
        wrapper.innerHTML = '<div class="media-content"><img src="' + url + '" alt="Media" class="responsive-media" onerror="this.onerror=null;this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect fill=%22%23222%22 width=%22400%22 height=%22300%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2218%22>Failed to load media</text></svg>\';"></div>';
        showAlert('Media loaded successfully!', 'success');
      } else {
        // Try as iframe fallback
        wrapper.innerHTML = '<div class="chat-scaler" id="chat-scaler"><iframe id="chat-frame" src="' + url + '" allow="clipboard-write"></iframe></div>';
        const iframe = document.getElementById('chat-frame');
        iframe.onload = () => {
          scaleChat();
          showAlert('Content loaded!', 'success');
        };
        setTimeout(() => {
          scaleChat();
          showAlert('Content loaded!', 'success');
        }, 1000);
      }
    }
    
    // Helper functions to detect media types
    function isImage(url) {
      return /\.(gif|jpg|jpeg|png|webp|svg|avif)(\?.*)?$/i.test(url);
    }
    
    function isGif(url) {
      return /\.gif(\?.*)?$/i.test(url);
    }
    
    function isVideo(url) {
      return /\.(mp4|webm|ogg|mov|avi|mkv)(\?.*)?$/i.test(url);
    }
    
    function isDirectMediaURL(url) {
      // Check for common CDN patterns that serve images
      return url.includes('i.imgur.com') || 
             url.includes('cdn.') || 
             url.includes('media.') ||
             url.includes('images.');
    }
    
    // Alert/notification system with animations
    function showAlert(message, type = 'info') {
      // Remove existing alerts
      const existingAlert = document.querySelector('.animated-alert');
      if (existingAlert) {
        existingAlert.remove();
      }
      
      const alertDiv = document.createElement('div');
      alertDiv.className = 'animated-alert';
      
      const icons = {
        info: 'ℹ️',
        success: '✅',
        warning: '⚠️',
        error: '❌'
      };
      
      alertDiv.innerHTML = '<span class="alert-icon">' + icons[type] + '</span><span class="alert-message">' + message + '</span>';
      document.body.appendChild(alertDiv);
      
      // Trigger animation
      setTimeout(() => alertDiv.classList.add('show'), 10);
      
      // Auto-remove after 3 seconds
      setTimeout(() => {
        alertDiv.classList.remove('show');
        setTimeout(() => alertDiv.remove(), 300);
      }, 3000);
    }
    
    function scaleChat() {
      const wrapper = document.getElementById('chat-wrapper');
      const scaler = document.getElementById('chat-scaler');
      const iframe = document.getElementById('chat-frame');
      
      if (!wrapper || !scaler || !iframe) return;
      
      const wrapperRect = wrapper.getBoundingClientRect();
      const targetWidth = 400; // Standard chat width
      const targetHeight = 600; // Standard chat height
      
      // Calculate scale to fit
      const scaleX = wrapperRect.width / targetWidth;
      const scaleY = wrapperRect.height / targetHeight;
      const scale = Math.min(scaleX, scaleY, 1); // Don't scale up
      
      scaler.style.transform = `scale(${scale})`;
      
      // Set iframe size before scaling
      iframe.style.width = targetWidth + 'px';
      iframe.style.height = targetHeight + 'px';
    }
    
    // Handle window resize
    window.addEventListener('resize', scaleChat);
  </script>
</body>
</html>
